<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Alarm To-Do</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: black;
}

/* SKY */
.sky {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(black, #001);
  z-index: -5;
}

/* ROAD */
.road {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: #222;
  z-index: -4;
}

.road::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 5px;
  background: white;
  top: 50%;
  left: 0;
  animation: roadMove 2s linear infinite;
}

@keyframes roadMove {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* VEHICLES */
.vehicle {
  position: fixed;
  font-size: 40px;
}

/* CAR */
.car {
  bottom: 60px;
  animation: moveCar 6s linear infinite;
}

@keyframes moveCar {
  from { left: -100px; }
  to { left: 110%; }
}

/* BIKE */
.bike {
  bottom: 20px;
  animation: moveBike 4s linear infinite;
}

@keyframes moveBike {
  from { left: -100px; }
  to { left: 110%; }
}

/* BUS */
.bus {
  bottom: 80px;
  animation: moveBus 8s linear infinite;
}

@keyframes moveBus {
  from { left: -150px; }
  to { left: 110%; }
}

/* FLIGHT */
.flight {
  top: 50px;
  font-size: 30px;
  animation: fly 10s linear infinite;
}

@keyframes fly {
  from { left: -100px; }
  to { left: 110%; }
}

/* UI */
.card {
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  color: white;
}

#clock {
  text-align: center;
  color: white;
  margin: 10px;
}

.completed {
  text-decoration: line-through;
  opacity: 0.6;
}

/* ALARM */
#alarmScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, red, black);
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}
</style>
</head>

<body>

<div class="sky"></div>
<div class="road"></div>

<div class="vehicle car">🚗</div>
<div class="vehicle bike">🏍️</div>
<div class="vehicle bus">🚌</div>
<div class="vehicle flight">✈️</div>

<div id="clock"></div>

<div class="container my-5">
  <div class="card p-4">
    <h2 class="text-center">📱 Smart Alarm To-Do</h2>

    <form id="taskForm" class="row g-2 my-3">
      <div class="col-md-4">
        <input type="text" id="taskInput" class="form-control" placeholder="Task" required>
      </div>
      <div class="col-md-4">
        <input type="date" id="dateInput" class="form-control" required>
      </div>
      <div class="col-md-4">
        <input type="time" id="timeInput" class="form-control" required>
      </div>

      <div class="col-md-12 mt-2">
        <button class="btn btn-primary w-100">Add Task</button>
      </div>
    </form>

    <ul id="taskList" class="list-group"></ul>
  </div>
</div>

<div id="alarmScreen">
  <h1 id="alarmText">⏰ Alarm!</h1>
  <button class="btn btn-danger mt-3" onclick="stopAlarm()">STOP</button>
</div>

<audio id="alarmSound"></audio>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

const form = document.getElementById("taskForm");
const list = document.getElementById("taskList");

const taskInput = document.getElementById("taskInput");
const dateInput = document.getElementById("dateInput");
const timeInput = document.getElementById("timeInput");

const alarmScreen = document.getElementById("alarmScreen");
const alarmText = document.getElementById("alarmText");
const alarmSound = document.getElementById("alarmSound");

/* CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

/* ADD TASK */
form.addEventListener("submit", e => {
  e.preventDefault();

  const task = {
    id: Date.now(),
    text: taskInput.value,
    date: dateInput.value,
    time: timeInput.value,
    completed: false,
    notified: false
  };

  tasks.push(task);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
  form.reset();
});

/* RENDER */
function render() {
  list.innerHTML = "";

  tasks.forEach(task => {
    const li = document.createElement("li");
    li.className = "list-group-item bg-transparent text-white";

    li.innerHTML = `
      ${task.text} - ${task.time}
      <button onclick="deleteTask(${task.id})" class="btn btn-danger btn-sm">Delete</button>
    `;
    list.appendChild(li);
  });
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

/* ALARM */
function triggerAlarm(task) {
  alarmText.innerText = "⏰ " + task.text;
  alarmScreen.style.display = "flex";

  alarmSound.src = "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg";
  alarmSound.loop = true;
  alarmSound.play();
}

function stopAlarm() {
  alarmScreen.style.display = "none";
  alarmSound.pause();
}

/* CHECK */
setInterval(() => {
  const now = new Date();

  tasks.forEach(task => {
    const taskTime = new Date(task.date + "T" + task.time);

    if (!task.notified && now >= taskTime) {
      triggerAlarm(task);
      task.notified = true;
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }
  });
}, 1000);

render();
</script>

</body>
</html>
