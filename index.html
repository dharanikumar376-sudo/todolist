<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart To-Do List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      font-family: Arial;
    }
    .card {
      border-radius: 15px;
    }
    .list-group-item {
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .completed {
      text-decoration: line-through;
      opacity: 0.6;
    }
    .priority-High { border-left: 5px solid red; }
    .priority-Medium { border-left: 5px solid orange; }
    .priority-Low { border-left: 5px solid green; }
  </style>
</head>
<body>

<div class="container my-5">
  <div class="card p-4">
    <h1 class="text-center">📝 Smart To-Do List</h1>

    <!-- Form -->
    <form id="taskForm" class="row g-2 my-3">
      <div class="col-md-4">
        <input type="text" id="taskInput" class="form-control" placeholder="Task" required>
      </div>
      <div class="col-md-3">
        <input type="date" id="dateInput" class="form-control" required>
      </div>
      <div class="col-md-3">
        <select id="priorityInput" class="form-control">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100">Add</button>
      </div>
    </form>

    <!-- Search -->
    <input type="text" id="search" class="form-control mb-3" placeholder="Search tasks...">

    <!-- Task List -->
    <ul id="taskList" class="list-group"></ul>
    <p id="emptyMessage" class="text-center text-light mt-3"></p>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  const form = document.getElementById("taskForm");
  const list = document.getElementById("taskList");
  const search = document.getElementById("search");
  const emptyMessage = document.getElementById("emptyMessage");

  const taskInput = document.getElementById("taskInput");
  const dateInput = document.getElementById("dateInput");
  const priorityInput = document.getElementById("priorityInput");

  render();

  form.addEventListener("submit", e => {
    e.preventDefault();

    const task = {
      id: Date.now(),
      text: taskInput.value,
      date: dateInput.value,
      priority: priorityInput.value,
      completed: false
    };

    tasks.push(task);
    save();
    render();
    form.reset();
  });

  search.addEventListener("input", render);

  function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function render() {
    list.innerHTML = "";

    const filtered = tasks
      .filter(t => t.text.toLowerCase().includes(search.value.toLowerCase()))
      .sort((a, b) => {
        // Sort by priority first, then by date
        const priorityOrder = { High: 1, Medium: 2, Low: 3 };
        if (priorityOrder[a.priority] !== priorityOrder[b.priority]) {
          return priorityOrder[a.priority] - priorityOrder[b.priority];
        }
        return new Date(a.date) - new Date(b.date);
      });

    if (filtered.length === 0) {
      emptyMessage.textContent = "No tasks found. Add one above!";
    } else {
      emptyMessage.textContent = "";
    }

    filtered.forEach(task => {
      const li = document.createElement("li");
      li.className = `list-group-item d-flex justify-content-between align-items-center priority-${task.priority}`;

      if (task.completed) li.classList.add("completed");

      li.innerHTML = `
        <div class="task-text">
          <strong>${task.text}</strong><br>
          <small>${task.date} | ${task.priority}</small>
        </div>
        <div>
          <button class="btn btn-success btn-sm">✔</button>
          <button class="btn btn-warning btn-sm">✏</button>
          <button class="btn btn-danger btn-sm">🗑</button>
        </div>
      `;

      const [done, edit, del] = li.querySelectorAll("button");

      done.onclick = () => {
        task.completed = !task.completed;
        save();
        render();
      };

      del.onclick = () => {
        tasks = tasks.filter(t => t.id !== task.id);
        save();
        render();
      };

      edit.onclick = () => {
        const taskDiv = li.querySelector(".task-text");
        const input = document.createElement("input");
        input.type = "text";
        input.value = task.text;
        input.className = "form-control form-control-sm";

        taskDiv.innerHTML = "";
        taskDiv.appendChild(input);
        input.focus();

        input.addEventListener("blur", () => {
          if (input.value.trim()) {
            task.text = input.value.trim();
            save();
            render();
          } else {
            render();
          }
        });

        input.addEventListener("keydown", e => {
          if (e.key === "Enter") input.blur();
        });
      };

      list.appendChild(li);
    });
  }
</script>
</body>
</html>
