<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart To-Do</title>

<link rel="manifest" href="manifest.json">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: black;
}

.card {
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  color: white;
}

#clock {
  text-align: center;
  color: white;
  margin: 10px;
}

.completed {
  text-decoration: line-through;
  opacity: 0.6;
}
</style>
</head>

<body>

<div id="clock"></div>

<div class="container my-5">
  <div class="card p-4">
    <h2 class="text-center">📱 Smart Alarm To-Do</h2>

    <form id="taskForm" class="row g-2 my-3">
      <input type="text" id="taskInput" class="form-control" placeholder="Task" required>
      <input type="date" id="dateInput" class="form-control" required>
      <input type="time" id="timeInput" class="form-control" required>
      <button class="btn btn-primary mt-2">Add Task</button>
    </form>

    <ul id="taskList" class="list-group"></ul>
  </div>
</div>

<script>
/* ✅ SERVICE WORKER REGISTER */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker Registered"));
}

/* 🔔 REQUEST PERMISSION */
if ("Notification" in window) {
  Notification.requestPermission();
}

/* TASK SYSTEM */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

const form = document.getElementById("taskForm");
const list = document.getElementById("taskList");

const taskInput = document.getElementById("taskInput");
const dateInput = document.getElementById("dateInput");
const timeInput = document.getElementById("timeInput");

/* CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

/* ADD TASK */
form.addEventListener("submit", e => {
  e.preventDefault();

  const task = {
    id: Date.now(),
    text: taskInput.value,
    date: dateInput.value,
    time: timeInput.value,
    notified: false
  };

  tasks.push(task);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
  form.reset();
});

/* RENDER */
function render() {
  list.innerHTML = "";

  tasks.forEach(task => {
    const li = document.createElement("li");
    li.className = "list-group-item bg-transparent text-white";

    li.innerHTML = `
      <strong>${task.text}</strong><br>
      <small>${task.date} ${task.time}</small><br>
      <button class="btn btn-danger btn-sm mt-2" onclick="deleteTask(${task.id})">Delete</button>
    `;

    list.appendChild(li);
  });
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

/* 🔔 TRIGGER NOTIFICATION */
function triggerAlarm(task) {
  navigator.serviceWorker.ready.then(reg => {
    reg.showNotification("⏰ Alarm!", {
      body: task.text,
      icon: "https://cdn-icons-png.flaticon.com/512/992/992700.png",
      vibrate: [200,100,200],
      requireInteraction: true
    });
  });
}

/* CHECK TIME */
setInterval(() => {
  const now = new Date();

  tasks.forEach(task => {
    const taskTime = new Date(task.date + "T" + task.time);

    if (!task.notified && now >= taskTime) {
      triggerAlarm(task);
      task.notified = true;
    }
  });

  localStorage.setItem("tasks", JSON.stringify(tasks));
}, 1000);

render();
</script>

</body>
</html>
