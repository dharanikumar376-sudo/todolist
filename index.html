<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Alarm To-Do</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  min-height: 100vh;
  font-family: Arial;
  background: linear-gradient(-45deg, #667eea, #764ba2, #ff6a00, #ee0979);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

#clock {
  text-align: center;
  color: white;
  font-size: 20px;
  margin: 10px;
}

.card {
  border-radius: 15px;
  background: rgba(255,255,255,0.9);
}

.completed {
  text-decoration: line-through;
}

/* Full screen alarm */
#alarmScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

#alarmScreen h1 {
  font-size: 40px;
}

</style>
</head>

<body>

<div id="clock"></div>

<div class="container my-5">
  <div class="card p-4">
    <h2 class="text-center">📱 Smart Alarm To-Do</h2>

    <form id="taskForm" class="row g-2 my-3">
      <div class="col-md-3">
        <input type="text" id="taskInput" class="form-control" placeholder="Task" required>
      </div>
      <div class="col-md-2">
        <input type="date" id="dateInput" class="form-control" required>
      </div>
      <div class="col-md-2">
        <input type="time" id="timeInput" class="form-control" required>
      </div>
      <div class="col-md-2">
        <select id="repeatInput" class="form-control">
          <option value="none">One Time</option>
          <option value="daily">Daily</option>
        </select>
      </div>
      <div class="col-md-3">
        <input type="file" id="soundInput" class="form-control">
      </div>
      <div class="col-md-12 mt-2">
        <button class="btn btn-primary w-100">Add Task</button>
      </div>
    </form>

    <ul id="taskList" class="list-group"></ul>
  </div>
</div>

<!-- Alarm UI -->
<div id="alarmScreen">
  <h1 id="alarmText">⏰ Alarm!</h1>
  <button class="btn btn-danger mt-3" onclick="stopAlarm()">STOP</button>
</div>

<audio id="alarmSound"></audio>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

const form = document.getElementById("taskForm");
const list = document.getElementById("taskList");

const taskInput = document.getElementById("taskInput");
const dateInput = document.getElementById("dateInput");
const timeInput = document.getElementById("timeInput");
const repeatInput = document.getElementById("repeatInput");
const soundInput = document.getElementById("soundInput");

const alarmScreen = document.getElementById("alarmScreen");
const alarmText = document.getElementById("alarmText");
const alarmSound = document.getElementById("alarmSound");

// Clock
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

// Notification
if ("Notification" in window) {
  Notification.requestPermission();
}

// Add Task
form.addEventListener("submit", e => {
  e.preventDefault();

  const file = soundInput.files[0];
  let soundURL = "";

  if (file) {
    soundURL = URL.createObjectURL(file);
  }

  const task = {
    id: Date.now(),
    text: taskInput.value,
    date: dateInput.value,
    time: timeInput.value,
    repeat: repeatInput.value,
    sound: soundURL,
    completed: false,
    notified: false
  };

  tasks.push(task);
  save();
  render();
  form.reset();
});

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

// Render
function render() {
  list.innerHTML = "";

  tasks.forEach(task => {
    const li = document.createElement("li");
    li.className = "list-group-item";

    li.innerHTML = `
      <strong>${task.text}</strong><br>
      <small>${task.date} ${task.time} (${task.repeat})</small>
    `;

    list.appendChild(li);
  });
}

// Alarm Trigger
function triggerAlarm(task) {
  alarmText.innerText = "⏰ " + task.text;
  alarmScreen.style.display = "flex";

  if (task.sound) {
    alarmSound.src = task.sound;
  } else {
    alarmSound.src = "https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3";
  }

  alarmSound.loop = true;
  alarmSound.play();

  // vibration
  if (navigator.vibrate) {
    navigator.vibrate([500, 300, 500, 300]);
  }

  if (Notification.permission === "granted") {
    new Notification("⏰ Alarm!", { body: task.text });
  }
}

// Stop alarm
function stopAlarm() {
  alarmScreen.style.display = "none";
  alarmSound.pause();
}

// Check reminders
function checkReminders() {
  const now = new Date();

  tasks.forEach(task => {
    if (!task.completed) {
      const taskTime = new Date(task.date + "T" + task.time);

      if (now >= taskTime && !task.notified) {
        triggerAlarm(task);

        if (task.repeat === "daily") {
          task.date = new Date(Date.now() + 86400000).toISOString().split("T")[0];
        } else {
          task.notified = true;
        }

        save();
      }
    }
  });
}

setInterval(checkReminders, 1000);

render();
</script>

</body>
</html>
