<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Alarm To-Do</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow-x: hidden;
  background: black;
}

/* 🎬 VIDEO BACKGROUND */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -4;
  filter: brightness(0.4);
}

/* 🌈 ANIMATED GRADIENT OVERLAY */
.gradient-overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -3;
  background: linear-gradient(270deg, #ff0080, #7928ca, #00c6ff);
  background-size: 600% 600%;
  animation: gradientMove 15s ease infinite;
  opacity: 0.3;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ✨ FLOATING PARTICLES */
.particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -2;
  overflow: hidden;
}

.particles span {
  position: absolute;
  display: block;
  width: 8px;
  height: 8px;
  background: white;
  opacity: 0.6;
  border-radius: 50%;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh) scale(0.5);
  }
  to {
    transform: translateY(-10vh) scale(1);
  }
}

/* ✨ GLASS EFFECT */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(6px);
  z-index: -1;
}

/* UI */
.card {
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  color: white;
}

#clock {
  text-align: center;
  color: white;
  margin: 10px;
  font-size: 20px;
}

.completed {
  text-decoration: line-through;
  opacity: 0.6;
}

/* ALARM */
#alarmScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, red, black);
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { background: black; }
  50% { background: red; }
  100% { background: black; }
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop playsinline id="bgVideo">
  <source src="https://cdn.coverr.co/videos/coverr-night-traffic-in-the-city-1566/1080p.mp4" type="video/mp4">
</video>

<!-- 🌈 GRADIENT -->
<div class="gradient-overlay"></div>

<!-- ✨ PARTICLES -->
<div class="particles" id="particles"></div>

<div id="clock"></div>

<div class="container my-5">
  <div class="card p-4">
    <h2 class="text-center">📱 Smart Alarm To-Do</h2>

    <form id="taskForm" class="row g-2 my-3">
      <div class="col-md-4">
        <input type="text" id="taskInput" class="form-control" placeholder="Task" required>
      </div>
      <div class="col-md-4">
        <input type="date" id="dateInput" class="form-control" required>
      </div>
      <div class="col-md-4">
        <input type="time" id="timeInput" class="form-control" required>
      </div>

      <div class="col-md-12 mt-2">
        <button class="btn btn-primary w-100">Add Task</button>
      </div>
    </form>

    <ul id="taskList" class="list-group"></ul>
  </div>
</div>

<!-- ALARM -->
<div id="alarmScreen">
  <h1 id="alarmText">⏰ Alarm!</h1>
  <button class="btn btn-danger mt-3" onclick="stopAlarm()">STOP</button>
</div>

<audio id="alarmSound"></audio>

<script>
/* ✨ GENERATE PARTICLES */
const particleContainer = document.getElementById("particles");

for (let i = 0; i < 40; i++) {
  const span = document.createElement("span");

  span.style.left = Math.random() * 100 + "vw";
  span.style.animationDuration = (5 + Math.random() * 10) + "s";
  span.style.opacity = Math.random();

  particleContainer.appendChild(span);
}

/* TASK LOGIC */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

const form = document.getElementById("taskForm");
const list = document.getElementById("taskList");

const taskInput = document.getElementById("taskInput");
const dateInput = document.getElementById("dateInput");
const timeInput = document.getElementById("timeInput");

const alarmScreen = document.getElementById("alarmScreen");
const alarmText = document.getElementById("alarmText");
const alarmSound = document.getElementById("alarmSound");

/* CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

/* ADD TASK */
form.addEventListener("submit", e => {
  e.preventDefault();

  const task = {
    id: Date.now(),
    text: taskInput.value,
    date: dateInput.value,
    time: timeInput.value,
    completed: false,
    notified: false
  };

  tasks.push(task);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
  form.reset();
});

/* RENDER */
function render() {
  list.innerHTML = "";

  tasks.forEach(task => {
    const li = document.createElement("li");
    li.className = "list-group-item bg-transparent text-white";

    if (task.completed) li.classList.add("completed");

    li.innerHTML = `
      <strong>${task.text}</strong><br>
      <small>${task.date} ${task.time} (Daily)</small><br>

      <button class="btn btn-success btn-sm mt-2" onclick="completeTask(${task.id})">Stop</button>
      <button class="btn btn-warning btn-sm mt-2" onclick="editTask(${task.id})">Edit</button>
      <button class="btn btn-danger btn-sm mt-2" onclick="deleteTask(${task.id})">Delete</button>
    `;

    list.appendChild(li);
  });
}

function completeTask(id) {
  tasks = tasks.map(t => {
    if (t.id === id) t.completed = true;
    return t;
  });
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);

  taskInput.value = task.text;
  dateInput.value = task.date;
  timeInput.value = task.time;

  deleteTask(id);
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

/* ALARM */
function triggerAlarm(task) {
  alarmText.innerText = "⏰ " + task.text;
  alarmScreen.style.display = "flex";

  alarmSound.src = "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg";
  alarmSound.loop = true;
  alarmSound.play();

  if (Notification.permission === "granted") {
    new Notification("⏰ Alarm!", { body: task.text });
  }
}

function stopAlarm() {
  alarmScreen.style.display = "none";
  alarmSound.pause();
}

/* CHECK */
setInterval(() => {
  const now = new Date();

  tasks.forEach(task => {
    const taskTime = new Date(task.date + "T" + task.time);

    if (!task.notified && now >= taskTime) {
      triggerAlarm(task);
      task.notified = true;

      const next = new Date(taskTime);
      next.setDate(next.getDate() + 1);
      task.date = next.toISOString().split("T")[0];
      task.notified = false;

      localStorage.setItem("tasks", JSON.stringify(tasks));
    }
  });
}, 1000);

render();
</script>

</body>
</html>
