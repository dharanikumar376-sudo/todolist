<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Alarm To-Do</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

.card {
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
}

#clock {
  text-align: center;
  margin: 10px;
}
</style>
</head>

<body>

<div id="clock"></div>

<div class="container my-5">
  <div class="card p-4">
    <h2 class="text-center">📱 Smart Alarm To-Do</h2>

    <!-- TEST BUTTON -->
    <button onclick="notifyNow()" class="btn btn-success mb-3">
      🔔 Test Notification
    </button>

    <form id="taskForm" class="row g-2 my-3">
      <input type="text" id="taskInput" class="form-control" placeholder="Task" required>
      <input type="date" id="dateInput" class="form-control" required>
      <input type="time" id="timeInput" class="form-control" required>
      <button class="btn btn-primary mt-2">Add Task</button>
    </form>

    <ul id="taskList"></ul>
  </div>
</div>

<script>
/* ⏰ CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

/* 🔔 PERMISSION */
if ("Notification" in window) {
  Notification.requestPermission();
}

/* 🔊 SOUND */
const audio = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");

/* 🔔 NOTIFY */
function notifyNow(text = "Test Notification") {
  audio.play();

  if (Notification.permission === "granted") {
    new Notification("⏰ Alarm", { body: text });
  } else {
    alert(text);
  }
}

/* TASK SYSTEM */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
const form = document.getElementById("taskForm");
const list = document.getElementById("taskList");

form.addEventListener("submit", e => {
  e.preventDefault();

  const task = {
    id: Date.now(),
    text: taskInput.value,
    date: dateInput.value,
    time: timeInput.value,
    notified: false
  };

  tasks.push(task);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
  form.reset();
});

function render() {
  list.innerHTML = "";

  tasks.forEach(t => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${t.text} - ${t.date} ${t.time}
      <button onclick="deleteTask(${t.id})">❌</button>
    `;
    list.appendChild(li);
  });
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

/* ⏰ CHECK TIME (WORKS ONLY IF PAGE OPEN) */
setInterval(() => {
  const now = new Date();

  tasks.forEach(t => {
    const taskTime = new Date(t.date + "T" + t.time);

    if (!t.notified && now >= taskTime) {
      notifyNow(t.text);
      t.notified = true;
    }
  });

  localStorage.setItem("tasks", JSON.stringify(tasks));
}, 1000);

render();
</script>

</body>
</html>
