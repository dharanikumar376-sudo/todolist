<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart To-Do List</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      font-family: Arial;
      overflow: hidden;
      background: linear-gradient(-45deg, #667eea, #764ba2, #ff6a00, #ee0979);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .bubble {
      position: absolute;
      bottom: -100px;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      animation: rise 10s infinite ease-in;
    }

    .bubble:nth-child(1) { left: 10%; animation-duration: 8s; }
    .bubble:nth-child(2) { left: 20%; animation-duration: 12s; width: 20px; height: 20px; }
    .bubble:nth-child(3) { left: 40%; animation-duration: 10s; }
    .bubble:nth-child(4) { left: 60%; animation-duration: 14s; width: 25px; height: 25px; }
    .bubble:nth-child(5) { left: 80%; animation-duration: 9s; }

    @keyframes rise {
      0% { transform: translateY(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-120vh); opacity: 0; }
    }

    .card {
      border-radius: 15px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.9);
    }

    .list-group-item {
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .priority-High { border-left: 5px solid red; }
    .priority-Medium { border-left: 5px solid orange; }
    .priority-Low { border-left: 5px solid green; }
  </style>
</head>

<body>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="container my-5">
  <div class="card p-4">
    <h1 class="text-center">📝 Smart To-Do List</h1>

    <!-- FORM -->
    <form id="taskForm" class="row g-2 my-3">
      <div class="col-md-3">
        <input type="text" id="taskInput" class="form-control" placeholder="Task" required>
      </div>
      <div class="col-md-2">
        <input type="date" id="dateInput" class="form-control" required>
      </div>
      <div class="col-md-2">
        <input type="time" id="timeInput" class="form-control" required>
      </div>
      <div class="col-md-3">
        <select id="priorityInput" class="form-control">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100">Add</button>
      </div>
    </form>

    <input type="text" id="search" class="form-control mb-3" placeholder="Search tasks...">

    <ul id="taskList" class="list-group"></ul>
    <p id="emptyMessage" class="text-center text-muted mt-3"></p>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  const form = document.getElementById("taskForm");
  const list = document.getElementById("taskList");
  const search = document.getElementById("search");
  const emptyMessage = document.getElementById("emptyMessage");

  const taskInput = document.getElementById("taskInput");
  const dateInput = document.getElementById("dateInput");
  const timeInput = document.getElementById("timeInput");
  const priorityInput = document.getElementById("priorityInput");

  // Ask notification permission
  if ("Notification" in window) {
    Notification.requestPermission();
  }

  render();

  form.addEventListener("submit", e => {
    e.preventDefault();

    const task = {
      id: Date.now(),
      text: taskInput.value,
      date: dateInput.value,
      time: timeInput.value,
      priority: priorityInput.value,
      completed: false,
      notified: false
    };

    tasks.push(task);
    save();
    render();
    form.reset();
  });

  search.addEventListener("input", render);

  function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function render() {
    list.innerHTML = "";

    const filtered = tasks
      .filter(t => t.text.toLowerCase().includes(search.value.toLowerCase()))
      .sort((a, b) => {
        const priorityOrder = { High: 1, Medium: 2, Low: 3 };
        if (priorityOrder[a.priority] !== priorityOrder[b.priority]) {
          return priorityOrder[a.priority] - priorityOrder[b.priority];
        }
        return new Date(a.date + "T" + a.time) - new Date(b.date + "T" + b.time);
      });

    if (filtered.length === 0) {
      emptyMessage.textContent = "No tasks found. Add one above!";
    } else {
      emptyMessage.textContent = "";
    }

    filtered.forEach(task => {
      const li = document.createElement("li");
      li.className = `list-group-item d-flex justify-content-between align-items-center priority-${task.priority}`;

      if (task.completed) li.classList.add("completed");

      li.innerHTML = `
        <div class="task-text">
          <strong>${task.text}</strong><br>
          <small>${task.date} ${task.time} | ${task.priority}</small>
        </div>
        <div>
          <button class="btn btn-success btn-sm">✔</button>
          <button class="btn btn-warning btn-sm">✏</button>
          <button class="btn btn-danger btn-sm">🗑</button>
        </div>
      `;

      const [done, edit, del] = li.querySelectorAll("button");

      done.onclick = () => {
        task.completed = !task.completed;
        save();
        render();
      };

      del.onclick = () => {
        tasks = tasks.filter(t => t.id !== task.id);
        save();
        render();
      };

      edit.onclick = () => {
        const taskDiv = li.querySelector(".task-text");
        const input = document.createElement("input");
        input.type = "text";
        input.value = task.text;
        input.className = "form-control form-control-sm";

        taskDiv.innerHTML = "";
        taskDiv.appendChild(input);
        input.focus();

        input.addEventListener("blur", () => {
          if (input.value.trim()) {
            task.text = input.value.trim();
            save();
            render();
          } else {
            render();
          }
        });

        input.addEventListener("keydown", e => {
          if (e.key === "Enter") input.blur();
        });
      };

      list.appendChild(li);
    });
  }

  // Reminder check
  function checkReminders() {
    const now = new Date();

    tasks.forEach(task => {
      if (!task.completed && !task.notified) {
        const taskTime = new Date(task.date + "T" + task.time);

        if (now >= taskTime) {
          if (Notification.permission === "granted") {
            new Notification("⏰ Reminder", {
              body: task.text + " (" + task.time + ")"
            });
          }

          task.notified = true;
          save();
        }
      }
    });
  }

  setInterval(checkReminders, 1000);
</script>

</body>
</html>
