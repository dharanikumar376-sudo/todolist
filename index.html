<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Alarm To-Do</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: black;
}

/* 🎥 VIDEO BASE */
#bgVideo {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -5;
  filter: brightness(0.25);
}

/* 🌌 AURORA LAYER */
.aurora {
  position: fixed;
  width: 200%;
  height: 200%;
  z-index: -4;
  background: radial-gradient(circle at 30% 50%, #ff00cc, transparent),
              radial-gradient(circle at 70% 50%, #00cfff, transparent),
              radial-gradient(circle at 50% 80%, #7928ca, transparent);
  animation: auroraMove 20s infinite linear;
  opacity: 0.4;
}

@keyframes auroraMove {
  0% { transform: translate(-10%, -10%) rotate(0deg); }
  50% { transform: translate(-20%, -30%) rotate(180deg); }
  100% { transform: translate(-10%, -10%) rotate(360deg); }
}

/* ✨ PARTICLES CANVAS */
#particlesCanvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -3;
}

/* 💡 MOUSE GLOW */
#mouseGlow {
  position: fixed;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.2), transparent 70%);
  transform: translate(-50%, -50%);
  z-index: -2;
}

/* ❄️ GLASS */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(8px);
  z-index: -1;
}

/* UI */
.card {
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  color: white;
}

#clock {
  text-align: center;
  color: white;
  margin: 10px;
}

.completed {
  text-decoration: line-through;
  opacity: 0.6;
}

/* ALARM */
#alarmScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, red, black);
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { background: black; }
  50% { background: red; }
  100% { background: black; }
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop id="bgVideo">
  <source src="https://cdn.coverr.co/videos/coverr-night-traffic-in-the-city-1566/1080p.mp4">
</video>

<!-- 🌌 AURORA -->
<div class="aurora"></div>

<!-- ✨ PARTICLES -->
<canvas id="particlesCanvas"></canvas>

<!-- 💡 MOUSE GLOW -->
<div id="mouseGlow"></div>

<div id="clock"></div>

<div class="container my-5">
  <div class="card p-4">
    <h2 class="text-center">📱 Smart Alarm To-Do</h2>

    <form id="taskForm" class="row g-2 my-3">
      <div class="col-md-4">
        <input type="text" id="taskInput" class="form-control" placeholder="Task" required>
      </div>
      <div class="col-md-4">
        <input type="date" id="dateInput" class="form-control" required>
      </div>
      <div class="col-md-4">
        <input type="time" id="timeInput" class="form-control" required>
      </div>

      <div class="col-md-12 mt-2">
        <button class="btn btn-primary w-100">Add Task</button>
      </div>
    </form>

    <ul id="taskList" class="list-group"></ul>
  </div>
</div>

<!-- ALARM -->
<div id="alarmScreen">
  <h1 id="alarmText">⏰ Alarm!</h1>
  <button class="btn btn-danger mt-3" onclick="stopAlarm()">STOP</button>
</div>

<audio id="alarmSound"></audio>

<script>
/* 🧠 PARTICLES SYSTEM (ADVANCED) */
const canvas = document.getElementById("particlesCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.5,
    depth: Math.random() * 2
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.y -= p.speed * p.depth;

    if (p.y < 0) {
      p.y = canvas.height;
      p.x = Math.random() * canvas.width;
    }

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.depth, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animateParticles);
}

animateParticles();

/* 💡 MOUSE GLOW */
const glow = document.getElementById("mouseGlow");

document.addEventListener("mousemove", e => {
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

/* TASK SYSTEM */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

const form = document.getElementById("taskForm");
const list = document.getElementById("taskList");

const taskInput = document.getElementById("taskInput");
const dateInput = document.getElementById("dateInput");
const timeInput = document.getElementById("timeInput");

const alarmScreen = document.getElementById("alarmScreen");
const alarmText = document.getElementById("alarmText");
const alarmSound = document.getElementById("alarmSound");

/* CLOCK */
setInterval(() => {
  document.getElementById("clock").innerText =
    new Date().toLocaleString();
}, 1000);

/* ADD TASK */
form.addEventListener("submit", e => {
  e.preventDefault();

  const task = {
    id: Date.now(),
    text: taskInput.value,
    date: dateInput.value,
    time: timeInput.value,
    completed: false,
    notified: false
  };

  tasks.push(task);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
  form.reset();
});

/* RENDER */
function render() {
  list.innerHTML = "";

  tasks.forEach(task => {
    const li = document.createElement("li");
    li.className = "list-group-item bg-transparent text-white";

    if (task.completed) li.classList.add("completed");

    li.innerHTML = `
      <strong>${task.text}</strong><br>
      <small>${task.date} ${task.time} (Daily)</small><br>

      <button class="btn btn-success btn-sm mt-2" onclick="completeTask(${task.id})">Stop</button>
      <button class="btn btn-warning btn-sm mt-2" onclick="editTask(${task.id})">Edit</button>
      <button class="btn btn-danger btn-sm mt-2" onclick="deleteTask(${task.id})">Delete</button>
    `;

    list.appendChild(li);
  });
}

function completeTask(id) {
  tasks = tasks.map(t => {
    if (t.id === id) t.completed = true;
    return t;
  });
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);

  taskInput.value = task.text;
  dateInput.value = task.date;
  timeInput.value = task.time;

  deleteTask(id);
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

/* ALARM */
function triggerAlarm(task) {
  alarmText.innerText = "⏰ " + task.text;
  alarmScreen.style.display = "flex";

  alarmSound.src = "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg";
  alarmSound.loop = true;
  alarmSound.play();
}

function stopAlarm() {
  alarmScreen.style.display = "none";
  alarmSound.pause();
}

/* CHECK */
setInterval(() => {
  const now = new Date();

  tasks.forEach(task => {
    const taskTime = new Date(task.date + "T" + task.time);

    if (!task.notified && now >= taskTime) {
      triggerAlarm(task);
      task.notified = true;

      const next = new Date(taskTime);
      next.setDate(next.getDate() + 1);
      task.date = next.toISOString().split("T")[0];
      task.notified = false;

      localStorage.setItem("tasks", JSON.stringify(tasks));
    }
  });
}, 1000);

render();
</script>

</body>
</html>
