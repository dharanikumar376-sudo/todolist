<script>
// Ask permission again (strong request)
if ("Notification" in window) {
  Notification.requestPermission().then(permission => {
    if (permission !== "granted") {
      alert("Enable notifications for full alarm experience!");
    }
  });
}

/* Show Notification */
function showPersistentNotification(task) {

  function notify() {
    if (Notification.permission === "granted") {
      new Notification("⏰ Alarm Reminder", {
        body: task.text,
        requireInteraction: true, // stays until user clicks
        icon: "https://cdn-icons-png.flaticon.com/512/1827/1827349.png"
      });
    }
  }

  notify();

  // Repeat every 10 sec until stopped
  task.notifyInterval = setInterval(() => {
    notify();
  }, 10000);
}

/* Stop Alarm + Notification */
function stopAlarm() {
  alarmScreen.style.display = "none";
  alarmSound.pause();
  alarmSound.currentTime = 0;

  tasks.forEach(task => {
    if (task.notifyInterval) {
      clearInterval(task.notifyInterval);
    }
  });
}

/* Trigger Alarm */
function triggerAlarm(task) {
  alarmText.innerText = "⏰ " + task.text;
  alarmScreen.style.display = "flex";

  alarmSound.src = "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg";
  alarmSound.loop = true;
  alarmSound.volume = 1.0;
  alarmSound.play().catch(()=>{});

  showPersistentNotification(task);
}
</script>
